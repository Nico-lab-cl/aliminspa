<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aliminspa – Próximamente</title>
  <meta name="description" content="Aliminspa.cl está en construcción. Contáctanos por WhatsApp." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #25D366;
      --green-dark: #1EB755;
      --accent: #00c6a2;
      --bg: #0a0e1a;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #e8eaf6;
      --muted: rgba(232,234,246,0.55);
    }

    html, body {
      min-height: 100%;
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── Animated gradient background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,198,162,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(37,211,102,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(10,14,26,0) 0%, #0a0e1a 100%);
      z-index: 0;
    }

    /* ── Floating orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
      animation: float 12s ease-in-out infinite alternate;
    }
    .orb-1 { width: 420px; height: 420px; background: var(--accent); top: -100px; left: -80px; animation-delay: 0s; }
    .orb-2 { width: 300px; height: 300px; background: var(--green); bottom: -60px; right: -60px; animation-delay: -5s; }
    @keyframes float {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    /* ── Layout ── */
    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    /* ── Badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.35rem 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2rem;
      backdrop-filter: blur(10px);
    }
    .badge-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.7); }
    }

    /* ── Logo / Brand ── */
    .brand {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      background: linear-gradient(135deg, #ffffff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    /* ── Headline ── */
    h1 {
      font-size: clamp(1.3rem, 4vw, 2rem);
      font-weight: 600;
      color: var(--text);
      margin-bottom: 1rem;
    }
    .subtitle {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: var(--muted);
      max-width: 460px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2rem 2.5rem;
      backdrop-filter: blur(16px);
      max-width: 480px;
      width: 100%;
      margin-bottom: 2.8rem;
    }
    .card p {
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 1.6rem;
    }
    .card p strong {
      color: var(--text);
      font-weight: 600;
    }

    /* ── WhatsApp Button ── */
    .wa-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: linear-gradient(135deg, var(--green) 0%, #1aad54 100%);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      text-decoration: none;
      border: none;
      border-radius: 14px;
      padding: 0.95rem 2rem;
      width: 100%;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
      box-shadow: 0 6px 28px rgba(37, 211, 102, 0.35);
    }
    .wa-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 36px rgba(37, 211, 102, 0.50);
      filter: brightness(1.08);
    }
    .wa-btn:active { transform: translateY(0); }

    .wa-btn svg {
      width: 22px; height: 22px;
      flex-shrink: 0;
    }

    /* ── Footer ── */
    footer {
      position: relative; z-index: 1;
      font-size: 0.8rem;
      color: var(--muted);
      padding-bottom: 1.5rem;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card { padding: 1.5rem 1.2rem; border-radius: 18px; }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <main>

    </div>

    <div class="brand">Aliminspa</div>

    </div>
  </main>

  </footer>
</body>
</html>
